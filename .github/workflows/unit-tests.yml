name: Unit Tests

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: |
          echo "🧪 Executando testes unitários..."
          python -m unittest test_security_toolkit -v

      - name: Upload test results (on failure)
        if: failure()
        run: echo "❌ Um ou mais testes falharam. Verifique os logs acima."
